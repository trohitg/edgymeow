<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message - WhatsApp Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        .status-indicator { @apply inline-block w-3 h-3 rounded-full mr-2; }
        .status-connected { @apply bg-green-500; }
        .status-disconnected { @apply bg-red-500; }
        .status-connecting { @apply bg-yellow-500 animate-pulse; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav id="main-nav"></nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h1 class="text-2xl font-semibold mb-6 flex items-center">
                    <svg class="w-8 h-8 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Send WhatsApp Message
                </h1>

                <form id="send-form" class="space-y-6">
                    <!-- Phone Number Input -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                            Phone Number
                        </label>
                        <div class="relative">
                            <input type="text"
                                   id="phone"
                                   name="phone"
                                   placeholder="e.g., 1234567890"
                                   required
                                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                                </svg>
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 mt-1">
                            Enter phone number with country code (without + sign)
                        </p>
                    </div>

                    <!-- Message Input -->
                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-2">
                            Message
                        </label>
                        <textarea id="message"
                                  name="message"
                                  rows="6"
                                  placeholder="Enter your message here..."
                                  required
                                  class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-transparent"></textarea>
                        <div class="flex justify-between items-center mt-1">
                            <p class="text-sm text-gray-600">
                                Type your WhatsApp message
                            </p>
                            <span id="char-count" class="text-sm text-gray-500">0 characters</span>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex space-x-4">
                        <button type="submit"
                                id="send-btn"
                                class="flex-1 bg-green-600 text-white py-3 px-6 rounded-lg hover:bg-green-700 transition font-medium flex items-center justify-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                            Send Message
                        </button>

                        <button type="button"
                                onclick="clearForm()"
                                class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium">
                            Clear
                        </button>
                    </div>
                </form>

                <!-- Connection Status Warning -->
                <div id="connection-warning" class="mt-6 hidden">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                        <div class="flex">
                            <svg class="w-5 h-5 text-yellow-400 mr-3" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                            </svg>
                            <div>
                                <h3 class="text-sm font-medium text-yellow-800">WhatsApp Not Connected</h3>
                                <p class="text-sm text-yellow-700 mt-1">
                                    Please start WhatsApp service from the <a href="/" class="underline">dashboard</a> before sending messages.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Messages -->
            <div class="bg-white rounded-lg shadow-md p-6 mt-6">
                <h2 class="text-lg font-semibold mb-4">Recent Messages</h2>
                <div id="recent-messages" class="space-y-3">
                    <p class="text-gray-600">No recent messages</p>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <p class="text-center text-gray-600">WhatsApp Controller - Static Web Client</p>
        </div>
    </footer>
    <script src="/js/rpc-client.js"></script>
    <script src="/js/app.js"></script>
    <script>
    let recentMessages = JSON.parse(localStorage.getItem('recentMessages') || '[]');

    // Character counter
    document.getElementById('message').addEventListener('input', function(e) {
        const count = e.target.value.length;
        document.getElementById('char-count').textContent = count + ' characters';
    });

    // Form submission
    document.getElementById('send-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const phone = document.getElementById('phone').value.trim();
        const message = document.getElementById('message').value.trim();
        const sendBtn = document.getElementById('send-btn');

        if (!phone || !message) {
            showNotification('Please fill in both phone number and message', 'error');
            return;
        }

        // Disable button and show loading
        sendBtn.disabled = true;
        sendBtn.innerHTML = `
            <svg class="w-5 h-5 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Sending...
        `;

        try {
            await rpc.call('send', { phone, message, type: 'text' });

            // Add to recent messages
            addRecentMessage(phone, message, 'sent');

            // Clear message field
            document.getElementById('message').value = '';
            document.getElementById('char-count').textContent = '0 characters';

            // Show success message
            showNotification('Message sent successfully!', 'success');
        } catch (error) {
            addRecentMessage(phone, message, 'failed');
            showNotification('Failed to send message: ' + error.message, 'error');
        } finally {
            // Re-enable button
            sendBtn.disabled = false;
            sendBtn.innerHTML = `
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
                Send Message
            `;
        }
    });

    function clearForm() {
        document.getElementById('phone').value = '';
        document.getElementById('message').value = '';
        document.getElementById('char-count').textContent = '0 characters';
    }

    function addRecentMessage(phone, message, status) {
        const messageObj = {
            phone: phone,
            message: message.substring(0, 100) + (message.length > 100 ? '...' : ''),
            status: status,
            timestamp: new Date().toLocaleString()
        };

        recentMessages.unshift(messageObj);
        if (recentMessages.length > 5) {
            recentMessages = recentMessages.slice(0, 5);
        }

        localStorage.setItem('recentMessages', JSON.stringify(recentMessages));
        renderRecentMessages();
    }

    function renderRecentMessages() {
        const container = document.getElementById('recent-messages');

        if (recentMessages.length === 0) {
            container.innerHTML = '<p class="text-gray-600">No recent messages</p>';
            return;
        }

        container.innerHTML = recentMessages.map(msg => `
            <div class="border rounded-lg p-3 bg-gray-50">
                <div class="flex justify-between items-start mb-2">
                    <span class="font-medium text-gray-900">${escapeHtml(msg.phone)}</span>
                    <span class="text-xs text-gray-500">${escapeHtml(msg.timestamp)}</span>
                </div>
                <p class="text-gray-700 text-sm">${escapeHtml(msg.message)}</p>
                <span class="inline-block mt-2 px-2 py-1 text-xs rounded-full ${
                    msg.status === 'sent' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
                }">${escapeHtml(msg.status)}</span>
            </div>
        `).join('');
    }

    // Check connection status and show warning if needed
    async function checkConnectionStatus() {
        try {
            const status = await rpc.call('status');
            const warning = document.getElementById('connection-warning');
            if (!status.connected) {
                warning.classList.remove('hidden');
            } else {
                warning.classList.add('hidden');
            }
        } catch (error) {
            document.getElementById('connection-warning').classList.remove('hidden');
        }
    }

    // Initialize
    renderRecentMessages();

    // Check connection status when RPC connects
    rpc.onStateChange(function(state) {
        if (state === 'connected') {
            checkConnectionStatus();
        }
    });

    // Check status periodically
    setInterval(function() {
        if (rpc.connected) {
            checkConnectionStatus();
        }
    }, 30000);
    </script>
</body>
</html>
